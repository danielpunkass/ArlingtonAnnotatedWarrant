name: Sync and deploy

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes; UTC, best-effort
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

# Serialize: queue overlapping runs rather than racing two pushes or two
# Pages deployments.
concurrency:
  group: sync-and-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Restore pdf2htmlEX renders (`*.pdf.html`) from cache. These
      # are gitignored — they're regenerated build artifacts, big and
      # non-deterministic, but stable per source PDF. The cache means
      # pdf2htmlEX only runs for attachments whose `historyId` has
      # actually changed (the script already skip-checks that). Single
      # static key: the sync script handles per-file invalidation
      # internally via historyId, so we don't need cache-key rotation.
      - name: Restore pdf build artifacts
        uses: actions/cache@v4
        with:
          path: |
            articles/*/*.pdf.html
          key: pdf-build-artifacts-v1

      # pdf2htmlEX renders each PDF attachment as a self-contained HTML
      # file (fonts/CSS/images embedded). The sync inlines those into
      # MkDocs pages so browser Cmd+F and the site's search index both
      # see PDF content as real document text — not iframed.
      # Pre-pulling the image once avoids re-pulling on every conversion.
      - name: Pre-pull pdf2htmlEX Docker image
        run: docker pull pdf2htmlex/pdf2htmlex:0.18.8.rc2-master-20200820-ubuntu-20.04-x86_64

      # Always run sync. Even on push events the working tree needs the
      # per-attachment `index.md` files (gitignored since they're pure
      # build artifacts) populated before `mkdocs build`, and only the
      # sync script produces them. We still skip the commit step on push
      # so we don't pile a bot commit on top of the human one.
      - name: Run sync
        run: python3 SyncAnnotatedWarrant.py

      - name: Commit if sync changed anything
        if: github.event_name != 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add -A
            git commit -m "Sync Annotated Warrant ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          else
            echo "No changes."
          fi

      # Stage just what we want shipped to the site into _site_build/, since
      # MkDocs forbids docs_dir from being the same dir as mkdocs.yml.
      #
      # We flatten the article directories from `articles/Article-N/` up to
      # `_site_build/Article-N/` so the awesome-pages plugin can list each
      # article as a top-level nav entry (the plugin's pattern matching only
      # operates at the current directory level — it can't pull items out of
      # a child dir into the parent's nav). The .pages and INDEX.md files
      # are written by sync with `articles/...` paths (correct for github.com
      # source browsing); a sed pass strips that prefix during staging.
      - name: Stage content for build
        run: |
          rm -rf _site_build
          mkdir -p _site_build
          cp -R articles/. _site_build/
          cp -R stylesheets _site_build/
          cp -R javascripts _site_build/
          sed 's|articles/||g' .pages > _site_build/.pages
          sed 's|articles/||g' INDEX.md > _site_build/index.md
          cp index.json _site_build/

      - name: Install MkDocs and plugins
        run: pip install mkdocs-material mkdocs-awesome-pages-plugin

      - name: Build site
        run: mkdocs build --strict

      # Cache-bust references to our extra.css / extra.js by appending
      # `?v=<short content hash>` in every generated HTML page. The hash
      # changes only when the underlying asset changes, so users see a
      # new URL (and bypass cached copies) on any real update while
      # unchanged assets continue to be cached normally. Restricting
      # to href="..."/src="..." attributes avoids touching matching
      # filenames that might appear elsewhere in page text.
      - name: Cache-bust asset references
        run: |
          CSS_HASH=$(sha1sum _site_build/stylesheets/extra.css | cut -c1-8)
          JS_HASH=$(sha1sum _site_build/javascripts/extra.js | cut -c1-8)
          PDFJS_HASH=$(sha1sum _site_build/javascripts/pdfjs-init.js | cut -c1-8)
          find site -name '*.html' -type f -exec sed -i \
            -e "s|href=\"\([^\"]*\)stylesheets/extra\.css\"|href=\"\1stylesheets/extra.css?v=$CSS_HASH\"|g" \
            -e "s|src=\"\([^\"]*\)javascripts/extra\.js\"|src=\"\1javascripts/extra.js?v=$JS_HASH\"|g" \
            -e "s|src=\"\([^\"]*\)javascripts/pdfjs-init\.js\"|src=\"\1javascripts/pdfjs-init.js?v=$PDFJS_HASH\"|g" \
            {} +

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

  # Trigger the mirror site (ArlingtonAnnotatedWarrant-Site) to rebuild
  # whenever this site's deploy finishes. The mirror builds from the
  # same source content but publishes at a different domain, so it
  # needs to know when this repo has fresh content. SITE_DISPATCH_TOKEN
  # is a PAT with write access to the mirror repo's Actions.
  dispatch-mirror:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Fire repository_dispatch at -Site
        run: |
          response=$(curl -sS -w "\n%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.SITE_DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/danielpunkass/ArlingtonAnnotatedWarrant-Site/dispatches \
            -d '{"event_type":"warrant-sync-completed"}')
          status=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)
          echo "HTTP $status"
          [ -n "$body" ] && echo "$body"
          [ "$status" -eq 204 ]
