name: Sync and deploy

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes; UTC, best-effort
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

# Serialize: queue overlapping runs rather than racing two pushes or two
# Pages deployments.
concurrency:
  group: sync-and-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Pull from primegov on schedule/manual. Skip on push events: the push
      # already captured any source-content change, and re-running sync would
      # try to push a noisy duplicate commit.
      - name: Run sync
        if: github.event_name != 'push'
        run: python3 SyncAnnotatedWarrant.py

      - name: Commit if sync changed anything
        if: github.event_name != 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add -A
            git commit -m "Sync Annotated Warrant ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          else
            echo "No changes."
          fi

      # Stage just what we want shipped to the site into _site_build/, since
      # MkDocs forbids docs_dir from being the same dir as mkdocs.yml.
      # INDEX.md becomes index.md (MkDocs convention).
      - name: Stage content for build
        run: |
          rm -rf _site_build
          mkdir -p _site_build
          cp -R articles _site_build/
          cp -R stylesheets _site_build/
          cp INDEX.md _site_build/index.md
          cp index.json _site_build/
          cp CNAME _site_build/

      - name: Install MkDocs and plugins
        run: pip install mkdocs-material mkdocs-awesome-pages-plugin

      - name: Build site
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
