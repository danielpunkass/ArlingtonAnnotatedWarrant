name: Sync progress

# Fast-cadence companion to "Sync and deploy". Refreshes only article
# dispositions from the Moderator's live progress sheet so the site
# reflects vote outcomes within minutes during an active meeting,
# without paying for the full primegov scrape + pdf2htmlEX conversion.
#
# Self-contained build + deploy: a push made with the default
# GITHUB_TOKEN does NOT trigger other workflows (GitHub's
# anti-recursion safeguard), so we can't rely on sync.yml's `on:
# push` to rebuild for us. The build/deploy steps below are
# intentionally a near-duplicate of the tail of sync.yml — keep
# them in sync if either side changes. We only run them when the
# progress sync actually produced changes; no-op ticks stay cheap.

on:
  schedule:
    # Every 5 minutes during a typical Arlington Town Meeting session.
    # Meetings convene Monday and Wednesday evenings, 8:00 PM local;
    # scheduled to adjourn around 11:00 PM but can run late, so we
    # keep polling through 11:55 PM. Cron is UTC: in EDT (UTC-4,
    # which covers the entire ATM spring season April–June), 8:00 PM
    # Mon/Wed local = 00:00 UTC Tue/Thu, and 11:55 PM Mon/Wed local =
    # 03:55 UTC Tue/Thu. UTC hours 0–3 inclusive give us the full
    # window. If a future meeting cycle ever runs during EST this
    # would slip an hour earlier locally — adjust then.
    - cron: "*/5 0-3 * * 2,4"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Shared with sync.yml so the two workflows queue rather than racing
# two pushes or two Pages deployments.
concurrency:
  group: sync-and-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changes.outputs.changed }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Same cache as sync.yml's full-sync job — see that file for the
      # rationale. Critical here because --progress-only never runs
      # pdf2htmlEX, so on cache miss the per-attachment pages fall
      # back to an iframe view until the next scheduled full sync.
      - name: Restore pdf build artifacts
        uses: actions/cache@v4
        with:
          path: |
            articles/*/*.pdf.html
            articles/*/*/index.md
          key: pdf-build-artifacts-v1

      - name: Refresh article statuses from progress sheet
        run: python3 SyncAnnotatedWarrant.py --progress-only

      - name: Detect changes
        id: changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes; build/deploy skipped."
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Refresh article statuses ($(date -u +%Y-%m-%dT%H:%MZ))"
          git push

      - name: Stage content for build
        if: steps.changes.outputs.changed == 'true'
        run: |
          rm -rf _site_build
          mkdir -p _site_build
          cp -R articles/. _site_build/
          cp -R stylesheets _site_build/
          cp -R javascripts _site_build/
          sed 's|articles/||g' .pages > _site_build/.pages
          sed 's|articles/||g' INDEX.md > _site_build/index.md
          cp index.json _site_build/

      - name: Install MkDocs and plugins
        if: steps.changes.outputs.changed == 'true'
        run: pip install mkdocs-material mkdocs-awesome-pages-plugin

      - name: Build site
        if: steps.changes.outputs.changed == 'true'
        run: mkdocs build --strict

      - name: Cache-bust asset references
        if: steps.changes.outputs.changed == 'true'
        run: |
          CSS_HASH=$(sha1sum _site_build/stylesheets/extra.css | cut -c1-8)
          JS_HASH=$(sha1sum _site_build/javascripts/extra.js | cut -c1-8)
          find site -name '*.html' -type f -exec sed -i \
            -e "s|href=\"\([^\"]*\)stylesheets/extra\.css\"|href=\"\1stylesheets/extra.css?v=$CSS_HASH\"|g" \
            -e "s|src=\"\([^\"]*\)javascripts/extra\.js\"|src=\"\1javascripts/extra.js?v=$JS_HASH\"|g" \
            {} +

      - uses: actions/upload-pages-artifact@v5
        if: steps.changes.outputs.changed == 'true'
        with:
          path: site

  deploy:
    needs: build
    if: needs.build.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
